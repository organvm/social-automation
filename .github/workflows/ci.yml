name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install kerygma-profiles from GitHub
        run: pip install "git+https://${{ secrets.GITHUB_TOKEN }}@github.com/organvm-vii-kerygma/kerygma-profiles.git"
      - run: pip install -e ".[dev]"
      - name: Type check with pyright
        run: |
          pip install pyright
          pyright kerygma_social/
      - run: python -m pytest tests/ -v
      - run: python -m ruff check kerygma_social/
